name: CI/CD Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest


    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:

      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4


      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      # Step 3: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      # Step 4: Run test cases using pytest
      - name: Run tests
        run: |
          pytest


      # Step 5: Build Docker image from Dockerfile
      - name: Build Docker image
        run: |
          docker build -t kamalipatel/tepis:latest .


      # Step 6 (Optional): Push Docker image to Docker Hub or GitHub Container Registry
      # Uncomment and configure the following steps if you want to publish the image
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # - name: Push Docker image
      #   run: |
      #     docker push kamalipatel/tepis:latest
  build:
    runs-on: ubuntu-latest
    needs: test
  
  deploy:
    runs-on: ubuntu-latest
    needs: build
